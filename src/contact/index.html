<!doctype html>
<html lang="ja">
  {{> head}}

  <body>
    {{> header}}

    <main class="l-main">
      <section class="p-contact l-page">
        <div class="p-contact__inner">

          <div class="p-contact__title">
            <div class="c-section-title" data-align="left">
              <h1 class="c-section-title__main">CONTACT</h1>
              <p class="c-section-title__sub">お問い合わせ<span class="c-deco-line" aria-hidden="true"></span></p>
            </div>
          </div>

          <div class="p-contact__form">
            <form class="p-contact-form" action="#" method="post">

              <div class="p-contact-form__row">
                <div class="p-contact-form__label-wrap">
                  <span class="p-contact-form__badge">必須</span>
                  <label class="p-contact-form__label" for="name">氏名</label>
                </div>
                <div class="p-contact-form__field">
                  <input class="p-contact-form__input" type="text" id="name" name="name" placeholder="例：山田 太郎" />
                </div>
              </div>

<div class="p-contact-form__row">
                <div class="p-contact-form__label-wrap">
                  <span class="p-contact-form__badge">必須</span>
                  <label class="p-contact-form__label" for="message">お問い合わせ内容</label>
                </div>
                <div class="p-contact-form__field">
                  <textarea class="p-contact-form__textarea" id="message" name="message" placeholder="お問い合わせ内容をご記入ください"></textarea>
                </div>
              </div>

              <div class="p-contact-form__row">
                <div class="p-contact-form__label-wrap">
                  <span class="p-contact-form__badge">必須</span>
                  <label class="p-contact-form__label" for="email">メールアドレス</label>
                </div>
                <div class="p-contact-form__field">
                  <input class="p-contact-form__input" type="email" id="email" name="email" placeholder="例：example@example.com" />
                </div>
              </div>

              <div class="p-contact-form__row">
                <div class="p-contact-form__label-wrap">
                  <span class="p-contact-form__badge">必須</span>
                  <label class="p-contact-form__label" for="tel">電話番号</label>
                </div>
                <div class="p-contact-form__field">
                  <input class="p-contact-form__input" type="tel" id="tel" name="tel" placeholder="例：090-1234-5678" />
                </div>
              </div>

              <div class="p-contact-form__privacy-wrap">
                <div class="p-contact-form__privacy">
                  <h3 class="p-contact-form__privacy-title">個人情報の取り扱いに関して</h3>
                  <p class="p-contact-form__privacy-text">ご入力いただいた情報は、弊社が別途定める目的の範囲内で利用いたします。<br>個人情報のお取り扱いに関する詳細は弊社<a href="/privacy-policy/" class="p-contact-form__privacy-link">プライバシーポリシー</a>をご確認のうえ、「個人情報の取り扱いについて同意する」にチェックいただき、「送信する」ボタンを押してください。</p>
                  <label class="p-contact-form__privacy-check">
                    <input type="checkbox" name="privacy" required />
                    個人情報の取り扱いについて同意する
                  </label>
                </div>
              </div>

              <div class="p-contact-form__submit">
                <button type="submit" class="c-button" data-color="primary">送信する</button>
              </div>

            </form>
          </div>

        </div>
      </section>
    </main>

    {{> footer}}

    <script type="module" src="/assets/js/script.js"></script>
  </body>
</html>
