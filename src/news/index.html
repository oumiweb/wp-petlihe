<!doctype html>
<html lang="ja">
  {{> head}}

  <body>
    {{> header}}

    <main class="l-main">

      <!-- ニュース一覧 -->
      <section class="p-news-list">
        <div class="p-news-list__inner l-inner l-inner--wide">

          <div class="p-news-list__title">
            <div class="c-section-title" data-align="left">
              <h1 class="c-section-title__main">NEWS</h1>
              <p class="c-section-title__sub">ニュース<span class="c-deco-line" aria-hidden="true"></span></p>
            </div>
          </div>

          <!-- MV -->
          <div class="p-news-list__mv">
            <figure class="p-news-list__mv-figure">
              <img src="/assets/images/news-mv.webp" alt="" width="1122" height="500" />
            </figure>
            <p class="p-news-list__mv-label">ニュース</p>
          </div>

          <!-- バナー -->
          <div class="p-news-list__banner">
            <img src="/assets/images/news-banner.webp" alt="毎月11日 ワンワンデー 会員カードは10%オフ 生体買った人は無料配布" width="1122" height="160" loading="lazy" />
          </div>

          <div class="p-news-list__container">

            <a href="#" class="p-news-list__item">
              <article class="p-news-list__card">
                <div class="p-news-list__meta">
                  <time class="p-news-list__date" datetime="2026-03-20">2026-03-20</time>
                  <span class="p-news-list__separator">•</span>
                  <span class="p-news-list__category">お知らせ</span>
                </div>
                <div class="p-news-list__content">
                  <div class="p-news-list__main">
                    <h2 class="p-news-list__title">新しいワンちゃんが入荷しました</h2>
                    <p class="p-news-list__excerpt">トイプードルをはじめ、今週も可愛いワンちゃんたちが仲間入りしました。</p>
                  </div>
                  <span class="p-news-list__arrow" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                  </span>
                </div>
              </article>
            </a>

            <a href="#" class="p-news-list__item">
              <article class="p-news-list__card">
                <div class="p-news-list__meta">
                  <time class="p-news-list__date" datetime="2026-03-10">2026-03-10</time>
                  <span class="p-news-list__separator">•</span>
                  <span class="p-news-list__category">お知らせ</span>
                </div>
                <div class="p-news-list__content">
                  <div class="p-news-list__main">
                    <h2 class="p-news-list__title">春の営業時間変更のお知らせ</h2>
                    <p class="p-news-list__excerpt">4月より営業時間が変更になります。詳しくは本文をご確認ください。</p>
                  </div>
                  <span class="p-news-list__arrow" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                  </span>
                </div>
              </article>
            </a>

            <a href="#" class="p-news-list__item">
              <article class="p-news-list__card">
                <div class="p-news-list__meta">
                  <time class="p-news-list__date" datetime="2026-02-28">2026-02-28</time>
                  <span class="p-news-list__separator">•</span>
                  <span class="p-news-list__category">イベント</span>
                </div>
                <div class="p-news-list__content">
                  <div class="p-news-list__main">
                    <h2 class="p-news-list__title">譲渡会のお知らせ</h2>
                  </div>
                  <span class="p-news-list__arrow" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                  </span>
                </div>
              </article>
            </a>

          </div>

          <!-- ページネーション -->
          <div class="p-news-list__pagination">
            <nav class="c-pagination" aria-label="ページネーション">
              <a href="#" class="c-pagination__item" data-state="prev" aria-label="前のページ">←</a>
              <a href="#" class="c-pagination__item" data-state="current" aria-current="page">1</a>
              <a href="#" class="c-pagination__item">2</a>
              <a href="#" class="c-pagination__item" data-state="next" aria-label="次のページ">→</a>
            </nav>
          </div>

        </div>
      </section>

    </main>

    {{> footer}}

    <script type="module" src="/assets/js/script.js"></script>
  </body>
</html>
