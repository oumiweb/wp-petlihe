<!doctype html>
<html lang="ja">
  {{> head}}

  <body>
    {{> header}}

    <main class="l-main">

      <!-- MV -->
      <section class="p-mv">
        <div class="p-mv__images">
          <div class="p-mv__image">
            <img src="/assets/images/image_mv_01.webp" alt="" width="480" height="640" fetchpriority="high" />
          </div>
          <div class="p-mv__image">
            <img src="/assets/images/image_mv_02.webp" alt="" width="480" height="640" />
          </div>
          <div class="p-mv__image">
            <img src="/assets/images/image_mv_03.webp" alt="" width="480" height="640" />
          </div>
        </div>
        <div class="p-mv__overlay">
          <p class="p-mv__logo">
            <img src="/assets/images/logo.svg" alt="PROMENADE" width="400" height="160" />
          </p>
        </div>
      </section>

      <!-- WELCOME -->
      <section class="p-welcome">
        <div class="p-welcome__inner l-inner">
          <div class="p-welcome__heading">
            <h2 class="p-welcome__title">WELCOME</h2>
            <p class="p-welcome__subtitle">ご家族募集中</p>
          </div>
          <ul class="p-welcome__grid">
            {{! ACF: have_rows('welcome_images') / the_sub_field('image') }}
            {{#each page.welcomeImages}}
            <li class="p-welcome__grid-item">
              <img src="{{this.src}}" alt="" width="551" height="446" loading="lazy" />
            </li>
            {{/each}}
          </ul>
          <div class="p-welcome__action">
            <a href="/dogs.html" class="c-button" data-color="primary">その他のワンちゃんはこちら</a>
          </div>
          <p class="p-welcom__notes">国内のグッズ取り扱っています。ニュートロ、ロイヤルカナンなども取り扱いあり
          </p>
        </div>
      </section>

      <!-- 店長コメント -->
      <section class="p-owner">
        <div class="p-owner__inner l-inner">
          <div class="p-owner__heading">
            <h2 class="p-owner__title">家族が見つかったワンちゃん</h2>
          </div>
          <ul class="p-owner__list">
            <li class="p-owner__item">
              <div class="p-owner__image">
                <img src="/assets/images/top-card01.webp" alt="" width="359" height="290" loading="lazy" />
              </div>
            </li>
            <li class="p-owner__item">
              <div class="p-owner__image">
                <img src="/assets/images/top-card02.webp" alt="" width="359" height="290" loading="lazy" />
              </div>
            </li>
            <li class="p-owner__item">
              <div class="p-owner__image">
                <img src="/assets/images/top-card03.webp" alt="" width="359" height="290" loading="lazy" />
              </div>
            </li>
          </ul>
          <div class="p-owner__action">
            <a href="/dogs.html" class="c-button" data-color="primary">その他のワンちゃんはこちら</a>
          </div>
        </div>
      </section>

      <!-- アクセス -->
      <section class="p-access">
        <div class="p-access__inner l-inner">
          <h2 class="p-access__title">ACCESS</h2>
          <div class="p-access__map">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3240.828030948489!2d139.6917064!3d35.6894875!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzXCsDQxJzIyLjIiTiAxMznCsDQxJzMwLjEiRQ!5e0!3m2!1sja!2sjp!4v1234567890"
              width="600"
              height="400"
              style="border:0;"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              title="店舗地図"
            ></iframe>
          </div>
        </div>
      </section>

    </main>

    {{> footer}}

    <script type="module" src="/assets/js/script.js"></script>
  </body>
</html>
